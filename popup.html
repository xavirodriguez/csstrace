<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 220px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #ffffff;
    }
    h2 {
      font-size: 14px;
      margin-top: 0;
      color: #1f2937;
    }
    p {
      font-size: 12px;
      color: #6b7280;
      line-height: 1.4;
    }
    button {
      width: 100%;
      background-color: #3b82f6;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      font-size: 13px;
      transition: background-color 0.2s;
    }
    button:hover {
      background-color: #2563eb;
    }
    .footer {
      margin-top: 12px;
      font-size: 10px;
      text-align: center;
      color: #9ca3af;
    }
  </style>
</head>
<body>
  <h2>CSS Origin Exporter</h2>
  <p>Selecciona un elemento de la página para copiar su HTML y CSS clasificado.</p>
  <button id="startBtn">Seleccionar Elemento</button>
  <div class="footer">Detecta Bootstrap y Tailwind</div>
  <script src="popup.js"></script>
</body>
</html>
